<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Chain Drop</title>
    <link rel="stylesheet" href="styles.css?v=20260521-6" />
    <link rel="stylesheet" href="mobile-fix.css?v=20260521-6" />
    <link rel="stylesheet" href="layout-fix.css?v=20260521-6" />
    <link rel="stylesheet" href="stage-fix.css?v=20260521-6" />
  </head>
  <body>
    <div class="stage">
      <main class="game-shell" aria-label="Chain Drop">
        <section class="topbar" aria-label="status">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <h1>Chain Drop</h1>
              <p id="stateText">Ready</p>
            </div>
          </div>
          <div class="controls">
            <button id="pauseButton" class="icon-button" type="button" aria-label="Pause">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5h3v14H8zM13 5h3v14h-3z"></path>
              </svg>
            </button>
            <button id="restartButton" class="icon-button" type="button" aria-label="Restart">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5a7 7 0 1 1-6.32 4H3.2A9 9 0 1 0 12 3v2z"></path>
                <path d="M4 4v6h6V8H6V4z"></path>
              </svg>
            </button>
            <button id="soundButton" class="icon-button" type="button" aria-label="Sound on"></button>
          </div>
        </section>

        <section class="score-panel" aria-label="score">
          <div>
            <span>Stage</span>
            <strong id="stageText">1</strong>
          </div>
          <div>
            <span>Score</span>
            <strong id="scoreText">0</strong>
          </div>
          <div>
            <span>Goal</span>
            <strong id="goalText">1,200</strong>
          </div>
          <div>
            <span>Moves</span>
            <strong id="movesText">24</strong>
          </div>
          <strong id="bestText" hidden>0</strong>
        </section>

        <section class="board-wrap">
          <div id="board" class="board" role="application" tabindex="0" aria-label="game board">
            <canvas id="boardCanvas" class="board-canvas" aria-hidden="true"></canvas>
          </div>
          <div id="comboBadge" class="combo-badge" aria-live="polite"></div>
        </section>

        <section class="bottom-panel" aria-label="chain and stage select">
          <div class="meter">
            <span id="chainText">0 Chain</span>
            <div class="meter-track">
              <span id="chainMeter"></span>
            </div>
          </div>
          <div class="stage-select" aria-label="stage select">
            <span class="stage-select-label">Stage Select</span>
            <div id="stageSelect" class="stage-select-buttons"></div>
          </div>
          <button id="shuffleButton" type="button" hidden disabled aria-hidden="true" tabindex="-1"></button>
        </section>
      </main>

      <aside id="sidekick" class="sidekick" aria-live="polite" aria-label="sidekick">
        <div class="sidekick-card">
          <img id="sidekickImage" class="sidekick-image" src="" alt="" />
          <p id="sidekickLine" class="sidekick-line">Ready!</p>
        </div>
      </aside>
    </div>

    <script src="block-assets.js?v=20260521-6"></script>
    <script src="character-assets.js?v=20260521-6"></script>
    <script src="audio-assets.js?v=20260521-6"></script>
    <script src="compat.js?v=20260521-6"></script>
    <script src="game.js?v=20260521-6"></script>
    <script src="speed-tuning.js?v=20260521-6"></script>
    <script src="stage-system.js?v=20260521-6"></script>
    <script src="sound-effects.js?v=20260521-6"></script>
    <script src="mobile-touch.js?v=20260521-6"></script>
  </body>
</html>
